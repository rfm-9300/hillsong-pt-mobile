server:
  port: 8081

spring:
  application:
    name: auth-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/auth_db}
      auto-index-creation: true
  mail:
    host: smtp.gmail.com # Default, change as needed
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    expiration: 86400000 # 24 hours
    issuer: auth-service
    audience: church-management-client
  verification:
    token-expiry: 86400000 # 24 hours
  reset:
    token-expiry: 3600000 # 1 hour
  base-url: http://localhost:8081
  email:
    from: noreply@church.com
    production: false
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}
