services:
  # ==========================================
  # MongoDB
  # ==========================================
  mongodb:
    image: mongo:7.0.31
    container_name: hillsong-mongodb
    command: mongod --bind_ip_all --wiredTigerCacheSizeGB 0.25
    restart: always
    stop_grace_period: 60s
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==========================================
  # MinIO Object Storage
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: hillsong-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # ==========================================
  # Auto-create MinIO bucket
  # ==========================================
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/church-files;
      /usr/bin/mc anonymous set download myminio/church-files;
      exit 0;
      "

volumes:
  mongo-data:
  minio-data:
