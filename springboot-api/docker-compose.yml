services:
  app:
    image: ${DOCKER_IMAGE_NAME:?Set DOCKER_IMAGE_NAME in .env}
    platform: linux/amd64
    container_name: backend-springboot
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      UPLOAD_PATH: /app/uploads
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      minio:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: backend-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        /usr/bin/mc alias set myminio http://minio:9000 "${MINIO_ACCESS_KEY:-minioadmin}" "${MINIO_SECRET_KEY:-minioadmin}"
        /usr/bin/mc mb --ignore-existing "myminio/${MINIO_BUCKET:-church-files}"
        /usr/bin/mc anonymous set download "myminio/${MINIO_BUCKET:-church-files}"

volumes:
  minio_data:
