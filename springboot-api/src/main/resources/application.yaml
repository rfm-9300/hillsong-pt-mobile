spring:
  application:
    name: church-management-api
  
  output:
    ansi:
      enabled: always
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/church_management_db}
      auto-index-creation: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:abizaria@gmail.com}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: openid,profile,email
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:dummy}
            client-secret: ${FACEBOOK_CLIENT_SECRET:dummy}
            scope: email,public_profile

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    expiration: 86400000 # 24 hours
    issuer: ${JWT_ISSUER:auth-service}
    audience: ${JWT_AUDIENCE:church-management-client}
  
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:church-files}
  
  email:
    from: ${SMTP_FROM:noreply@church.com}
    production: ${IS_PRODUCTION:false}
  
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
    facebook:
      app-id: ${FACEBOOK_APP_ID:}
      app-secret: ${FACEBOOK_APP_SECRET:}
  
  base-url: ${BASE_URL:http://localhost:8080}
  
  verification:
    token-expiry: 86400000 # 24 hours
  
  reset:
    token-expiry: 3600000 # 1 hour
  
  admin:
    token: ${ADMIN_TOKEN:}
    expose-token-endpoint: ${ADMIN_EXPOSE_TOKEN_ENDPOINT:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    rfm.com: DEBUG
    rfm.com.security: INFO
    rfm.com.controller: INFO
    rfm.com.service: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%thread]){magenta} %clr(%-5level){highlight} %clr([%X{requestId:-}]){cyan} %clr(%logger{36}){blue} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{requestId:-}] %logger{36} - %msg%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
