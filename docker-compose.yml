services:
  # ==========================================
  # Shared MongoDB
  # ==========================================
  mongodb:
    image: mongo:7.0.31
    container_name: hillsong-mongodb
    command: mongod --bind_ip_all --wiredTigerCacheSizeGB 0.25
    restart: always
    stop_grace_period: 60s
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hillsong-network

  # ========================================== 
  # Auth Service (IdP)
  # ==========================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/auth_db
      - APP_JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    depends_on:
      - mongodb
    networks:
      - hillsong-network
    restart: always

  # ==========================================
  # MinIO Object Storage
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: hillsong-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - hillsong-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # ==========================================
  # SpringBoot API (Resource Server)
  # ==========================================
  springboot-api:
    build:
      context: ./springboot-api
      dockerfile: Dockerfile
    container_name: backend-springboot
    volumes:
      - ./springboot-api/logs:/app/logs
    restart: always
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/church_management_db
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      - JWT_ISSUER=auth-service
      - JWT_AUDIENCE=church-management-client
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=church-files
    depends_on:
      - mongodb
      - minio
    networks:
      - hillsong-network

  # ==========================================
  # MinIO Bucket Creator
  # ==========================================
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/church-files;
      /usr/bin/mc anonymous set download myminio/church-files;
      exit 0;
      "
    networks:
      - hillsong-network

  # ==========================================
  # NextJS Admin Panel
  # ==========================================
  admin-panel:
    build:
      context: ./nextjs-admin-panel
      dockerfile: Dockerfile
    container_name: nextjs-admin
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080/api
      - AUTH_SERVICE_URL=http://auth-service:8081
      - API_BASE_URL=http://springboot-api:8080/api
      - FILE_PROXY_URL=http://minio:9000/church-files
    depends_on:
      - springboot-api
    networks:
      - hillsong-network
    restart: always

networks:
  hillsong-network:
    driver: bridge

volumes:
  mongo-data:
  minio-data:
