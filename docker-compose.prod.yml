services:
  # ==========================================
  # Temporary public reverse proxy
  # ==========================================
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: hillsong-reverse-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - admin-panel
    networks:
      - hillsong-network

  # ==========================================
  # Shared MongoDB
  # ==========================================
  mongodb:
    image: mongo:7.0.31
    container_name: hillsong-mongodb
    restart: always
    # Limit WiredTiger cache to 256 MB (minimum allowed by Mongo 7.0) so Mongo doesn't hog RAM.
    # Tune --wiredTigerCacheSizeGB up if your VPS has more than 2 GB RAM.
    command: mongod --wiredTigerCacheSizeGB 0.25
    stop_grace_period: 60s
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.adminCommand({ ping: 1 }).ok' | mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - hillsong-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================
  # Auth Service (IdP)
  # ==========================================
  auth-service:
    image: rfm9300/hillsong-pt-auth-service:latest
    container_name: auth-service
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/auth_db?authSource=admin
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      # Tell the JVM to respect the container memory limit above.
      # -Xms64m: start with a small heap so cold-start doesn't spike RAM.
      # MaxRAMPercentage=75: grow heap up to 75% of the 384M limit (~288 MB) if needed.
      - JAVA_TOOL_OPTIONS=-XX:+UseContainerSupport -Xms64m -XX:MaxRAMPercentage=75.0
      # The SMTP server is unreachable — disable the mail health indicator so Docker
      # doesn't mark this container (unhealthy) and restart it in a loop.
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    depends_on:
      - mongodb
    networks:
      - hillsong-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 192M

  # ==========================================
  # MinIO Object Storage
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: hillsong-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - hillsong-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ==========================================
  # SpringBoot API (Resource Server)
  # ==========================================
  springboot-api:
    image: rfm9300/hillsong-pt-springboot-api:latest
    container_name: backend-springboot
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/church_management_db?authSource=admin
      - JWT_SECRET=${APP_JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=church-files
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      # Tell the JVM to respect the container memory limit above.
      # -Xms64m: start with a small heap so cold-start doesn't spike RAM.
      # MaxRAMPercentage=75: grow heap up to 75% of the 512M limit (~384 MB) if needed.
      - JAVA_TOOL_OPTIONS=-XX:+UseContainerSupport -Xms64m -XX:MaxRAMPercentage=75.0
      # The SMTP server is unreachable — disable the mail health indicator so Docker
      # doesn't mark this container (unhealthy) and restart it in a loop.
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    depends_on:
      - mongodb
      - minio
    networks:
      - hillsong-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================
  # MinIO Bucket Creator
  # ==========================================
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing myminio/church-files;
      /usr/bin/mc anonymous set download myminio/church-files;
      exit 0;
      "
    networks:
      - hillsong-network
    deploy:
      resources:
        limits:
          memory: 64M

  # ==========================================
  # NextJS Admin Panel
  # ==========================================
  admin-panel:
    image: rfm9300/hillsong-pt-admin-panel:latest
    container_name: nextjs-admin
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-/api}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8081}
      - API_BASE_URL=${API_BASE_URL:-http://springboot-api:8080/api}
      - FILE_PROXY_URL=${FILE_PROXY_URL:-http://minio:9000/church-files}
    depends_on:
      - auth-service
      - springboot-api
    networks:
      - hillsong-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  hillsong-network:
    driver: bridge

volumes:
  mongo-data:
  minio-data:
